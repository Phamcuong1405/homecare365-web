<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0047ab" />
    <title>HomeCare365</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        font-family: system-ui, sans-serif;
        background: #0047ab;
        color: #fff;
        text-align: center;
      }
      .logo {
        width: 120px;
        height: auto;
        border-radius: 16px;
      }
      a {
        color: #fff;
        font-weight: 600;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <img class="logo" src="icon.png" width="120" height="120" alt="HomeCare365" />
    <div class="spinner" aria-hidden="true"></div>
    <p>Đang mở HomeCare365…</p>
    <p><a id="open" href="https://www.homecare365.vn">Mở trang web</a></p>
    <script>
      var target = "https://www.homecare365.vn";
      setTimeout(function () {
        window.location.replace(target);
      }, 400);
      document.getElementById("open").href = target;
    </script>
  </body>
</html>
