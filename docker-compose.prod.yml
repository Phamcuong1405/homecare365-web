services:
  web:
    build: .
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_SITE_URL: https://homecare365.vn
    volumes:
      - homecare-data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  homecare-data:
  caddy-data:
  caddy-config:
